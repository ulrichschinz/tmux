#
# Installation and preconfiguration
# Install powerline:
# pacman -S powerline
# generate fonts:
# mkdir ~/.fonts
# cd ~/.fonts
# wget https://github.com/powerline/powerline/raw/develop/font/10-powerline-symbols.conf
# wget https://github.com/powerline/powerline/raw/develop/font/PowerlineSymbols.otf
# fc-cache -vf ~/.fonts/
# mkdir -p ~/.config/fontconfig/conf.d/
# mv 10-powerline-symbols.conf ~/.config/fontconfig/conf.d/
#

# Set zsh as default
# set-option -g default-shell /bin/zsh

# enable powerline
# source  /usr/lib/python3.6/site-packages/powerline/bindings/tmux/powerline.conf
# if installied with pip:
#source ~/.local/lib/python2.7/site-packages/powerline/bindings/tmux/powerline.conf
#source /usr/share/tmux/powerline.conf
#source /usr/lib/python2.7/site-packages/powerline/bindings/tmux/powerline.conf

# NOTE (macOS): the powerline python tool is NOT installed here, only the
# powerline fonts in ~/Library/Fonts. So we do NOT source powerline.conf
# (that path is Ubuntu-only and aborts config parsing). Instead a native
# powerline-style status line is defined at the bottom of this file using
# the powerline glyphs - no python dependency required.

set-option -g default-terminal "screen-256color"


# Set vim keybindings
set-window-option -g mode-keys vi
#bind-key -t vi-copy 'v' begin-selection
#bind-key -t vi-copy 'y' copy-pipe 'xclip -in -selection clipboard'
bind-key -Tcopy-mode-vi 'v' send-keys -X begin-selection
bind-key -Tcopy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'
# Mouse selection also copies to the macOS clipboard
bind-key -Tcopy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'

# Url view
bind-key u capture-pane \; save-buffer /tmp/tmux-buffer \; new-window -n "urlview" '$SHELL -c "urlview < /tmp/tmux-buffer"'

# Remove esc-delay
set -s escape-time 0

# Rebind C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix


# Split-commands easier
bind | split-window -h
bind - split-window -v
unbind '"'
unbind '%'

# Easy reload of tmux-config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Switching panes
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# send to all panes
bind a set-window-option synchronize-panes

# Allow mouse-use
set -g mouse on
# Let tmux write to the terminal clipboard via OSC 52 (works in iTerm2,
# also over SSH). Combined with the pbcopy copy bindings above this means
# mouse-drag or copy-mode 'y' lands straight in the macOS clipboard.
set -g set-clipboard on
# set -g visual-bell on

#set -g default-command /usr/bin/fish
# macOS: zsh lives in /bin, not /usr/bin. A non-existent path here makes
# every pane die immediately and the session exit ("tmux stirbt sofort").
set -g default-command /bin/zsh

set-option -g history-limit 500000

# ---------------------------------------------------------------------------
# Native powerline-style status line (uses the powerline fonts, no python)
# Glyphs:  U+E0B0 (right arrow)   U+E0B2 (left arrow)
# ---------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=colour236,fg=colour247"

# Left side: session name in a powerline segment
set -g status-left-length 40
set -g status-left "#[fg=colour236,bg=colour33,bold] #S #[fg=colour33,bg=colour240]#[fg=colour247,bg=colour240] #(whoami) #[fg=colour240,bg=colour236]"

# Right side: date / time segments
set -g status-right-length 80
set -g status-right "#[fg=colour240,bg=colour236]#[fg=colour247,bg=colour240] %Y-%m-%d #[fg=colour33,bg=colour240]#[fg=colour236,bg=colour33,bold] %H:%M "

# Window list: inactive vs active with powerline separators
set -g window-status-format "#[fg=colour236,bg=colour236] #[fg=colour247,bg=colour236]#I:#W #[fg=colour236,bg=colour236]"
set -g window-status-current-format "#[fg=colour236,bg=colour240]#[fg=colour231,bg=colour240,bold] #I:#W #[fg=colour240,bg=colour236]"
set -g window-status-separator ""

# Pane borders / messages tinted to match
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour33"
set -g message-style "bg=colour33,fg=colour236,bold"
